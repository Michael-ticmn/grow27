name: Scrape Auction Barn Prices

on:
  schedule:
    # 7:00am CT = 12:00 UTC (CST) / 13:00 UTC (CDT)
    # Running at 12:00 UTC covers both CST and CDT within an hour.
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commits

    steps:
      - uses: actions/checkout@v3
        with:
          ref: UserUpdates
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pull latest BEFORE the scraper runs so history files are current
      - name: Pull latest
        run: git pull origin UserUpdates

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio puppeteer

      - name: Run barn scraper
        run: node scripts/scrape-barns.js

      - name: Reset non-price files
        run: git checkout -- . && git clean -fd --exclude=data/prices/

      - name: Commit updated price files
        run: |
          git config user.name "grow27-bot"
          git config user.email "bot@grow27.com"
          git add data/prices/
          git diff --staged --quiet || git commit -m "data: barn prices $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin UserUpdates
