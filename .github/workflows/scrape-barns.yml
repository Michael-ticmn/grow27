name: Scrape Auction Barn Prices

on:
  schedule:
    # 7:00am CT = 12:00 UTC (CST) / 13:00 UTC (CDT)
    # Running at 12:00 UTC covers both CST and CDT within an hour.
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commits

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cheerio
        run: npm install cheerio

      - name: Run barn scraper
        run: node scripts/scrape-barns.js

      - name: Commit updated price files
        id: commit
        run: |
          git config user.name  "grow27-bot"
          git config user.email "actions@github.com"

          # Switch to (or create) UserUpdates branch
          git fetch origin
          if git ls-remote --exit-code --heads origin UserUpdates; then
            git checkout -B UserUpdates origin/UserUpdates
            # Bring scripts/config forward from main if UserUpdates is behind
            git merge --no-edit -s ours origin/main || true
          else
            git checkout -b UserUpdates
          fi

          # Stage only the data files written by the scraper
          git add data/prices/

          if git diff --staged --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No price changes — skipping commit."
          else
            git commit -m "data: barn prices $(date -u +'%Y-%m-%d %H:%MZ')"
            git push origin UserUpdates
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            echo "Pushed updated prices to UserUpdates."
          fi

      - name: Summary
        run: |
          if [ "${{ steps.commit.outputs.no_changes }}" = "true" ]; then
            echo "### No price changes today" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Barn prices updated" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat data/prices/index.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
