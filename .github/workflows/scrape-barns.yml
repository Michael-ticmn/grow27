name: Scrape Auction Barn Prices
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: UserUpdates
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          clean: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio puppeteer

      - name: Run barn scraper
        run: node scripts/scrape-barns.js

      - name: Show git status
        run: git status

      - name: Commit updated price files
        run: |
          git config user.name "grow27-bot"
          git config user.email "bot@grow27.com"
          git add data/prices/
          git diff --staged --quiet || git commit -m "data: barn prices $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force-with-lease origin UserUpdates
