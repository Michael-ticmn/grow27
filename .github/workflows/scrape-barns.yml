name: Scrape Auction Barn Prices
on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install cheerio puppeteer tesseract.js sharp pdf-parse@1.1.1

      - name: Run barn scraper
        run: node scripts/scrape-barns.js

      - name: Show git status
        run: git status

      - name: Commit updated price files
        run: |
          git config user.name "grow27-bot"
          git config user.email "bot@grow27.com"
          git add data/prices/
          git diff --staged --quiet || git commit -m "data: barn prices $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push origin main

      - name: Check for stale sources
        run: node scripts/check-staleness.js barns
