name: Check robots.txt
on:
  schedule:
    # Midnight CT (06:00 UTC) daily
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check robots.txt for all sources
        run: node scripts/robots-check.js

      - name: Commit robots log
        run: |
          git config user.name "grow27-bot"
          git config user.email "bot@grow27.local"
          git add data/robots-log.json
          git diff --cached --quiet || git commit -m "data: update robots.txt log"
          git pull --rebase origin main || true
          git push origin main
