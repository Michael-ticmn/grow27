name: Scrape Futures History
on:
  schedule:
    - cron: '0 23 * * 1-5'   # 5pm CT Mon-Fri (after market close)
    - cron: '0 1 * * 2-6'    # 7pm CT Mon-Fri (backup)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run futures history scraper
        run: node scripts/scrape-futures-history.js

      - name: Show git status
        run: git status

      - name: Commit updated futures history
        run: |
          git config user.name "grow27-bot"
          git config user.email "bot@grow27.com"
          git add data/prices/futures-history.json
          git diff --staged --quiet || git commit -m "data: futures history $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase origin main || true
          git push origin main
